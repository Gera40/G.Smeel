<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Полная 3D Комната</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #stick-bg { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; 
                    background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #stick-knob { width: 60px; height: 60px; background: white; border-radius: 50%; 
                      position: absolute; left: 30px; top: 30px; transition: transform 0.05s; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="stick-bg"><div id="stick-knob"></div></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // Инициализация
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Создание стен с неровностями ---
        function createTexturedWall(w, h, color) {
            const geom = new THREE.PlaneGeometry(w, h, 20, 20);
            const pos = geom.attributes.position;
            for(let i=0; i<pos.count; i++) pos.setZ(i, (Math.random()-0.5)*0.1);
            return new THREE.Mesh(geom, new THREE.MeshStandardMaterial({color: color, side: THREE.DoubleSide}));
        }

        const roomSize = 5;
        const walls = [
            {pos: [0, 1.5, -roomSize/2], rot: [0, 0, 0]},
            {pos: [0, 1.5, roomSize/2], rot: [0, Math.PI, 0]},
            {pos: [-roomSize/2, 1.5, 0], rot: [0, Math.PI/2, 0]},
            {pos: [roomSize/2, 1.5, 0], rot: [0, -Math.PI/2, 0]}
        ];
        walls.forEach(w => {
            const wall = createTexturedWall(roomSize, 3, 0xaaaaaa);
            wall.position.set(...w.pos);
            wall.rotation.set(...w.rot);
            scene.add(wall);
        });

        // --- Мебель с высокой детализацией ---
        const bed = new THREE.Group();
        bed.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 2), new THREE.MeshStandardMaterial({color: 0x4a3c31})));
        const mattress = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.2, 1.9), new THREE.MeshStandardMaterial({color: 0xffffff}));
        mattress.position.y = 0.25; bed.add(mattress);
        const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.4), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
        pillow.position.set(0, 0.45, -0.6); bed.add(pillow);
        scene.add(bed); bed.position.set(-1.5, 0, -1);

        const table = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.6), new THREE.MeshStandardMaterial({color: 0x654321}));
        table.position.set(1.5, 0.35, 1.5); scene.add(table);
        
        const laptop = new THREE.Group();
        laptop.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.02, 0.4), new THREE.MeshStandardMaterial({color: 0x222222})));
        const screen = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.25, 0.02), new THREE.MeshStandardMaterial({color: 0x000000}));
        screen.position.set(0, 0.14, -0.2); screen.rotation.x = -Math.PI/5;
        laptop.add(screen);
        laptop.position.set(1.5, 0.71, 1.5); scene.add(laptop);

        // Свет
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(0, 2, 0); scene.add(light);

        // Управление и коллизии
        let yaw = 0, pitch = 0, move = {x: 0, z: 0};
        camera.position.set(0, 1.6, 0);

        // Логика движения с ограничением (коллизии)
        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const dir = new THREE.Vector3(move.x, 0, move.z).applyEuler(camera.rotation);
            let nextPos = camera.position.clone().add(dir.multiplyScalar(0.06));
            
            // Проверка стен
            if(Math.abs(nextPos.x) < 2.3 && Math.abs(nextPos.z) < 2.3) {
                camera.position.copy(nextPos);
            }
            renderer.render(scene, camera);
        }

        // Слушатели событий (тач-контролс)
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length === 1 && e.target.id !== 'stick-knob') {
                yaw -= e.changedTouches[0].movementX * 0.005;
                pitch -= e.changedTouches[0].movementY * 0.005;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        });

        document.getElementById('stick-bg').addEventListener('touchmove', (e) => {
            const rect = e.target.getBoundingClientRect();
            move.x = (e.touches[0].clientX - (rect.left + 60)) / 50;
            move.z = (e.touches[0].clientY - (rect.top + 60)) / 50;
        });
        document.getElementById('stick-bg').addEventListener('touchend', () => { move.x = 0; move.z = 0; });

        animate();
    </script>
</body>
</html>
