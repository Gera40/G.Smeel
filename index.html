<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Room 5x5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        /* Элементы управления для телефона */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Зона поворота камеры (вся левая половина) */
        #look-controls { position: absolute; top: 0; left: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        /* Джойстик ходьбы (справа) */
        #stick-bg { position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px; 
                    background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
                    pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        #stick-knob { width: 60px; height: 60px; background: rgba(255,255,255,0.5); border-radius: 50%; 
                      position: absolute; transform: translate(0%, 0%); transition: transform 0.1s ease-out; }
        
        #instr { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none;}
    </style>
</head>
<body>
    <div id="instr">Комната 5x5. Используйте экран для управления.</div>
    <div id="ui-layer">
        <div id="look-controls"></div>
        <div id="stick-bg">
            <div id="stick-knob"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // --- Базовая настройка ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x202020, 5, 15); // Туман для реализма в коробке
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); // Рост человека

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Включаем тени
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambient = new THREE.AmbientLight(0x404040); 
        scene.add(ambient);
        
        const light = new THREE.PointLight(0xffffff, 1.5, 10);
        light.position.set(0, 4, 0);
        light.castShadow = true;
        scene.add(light);

        // --- Создание Комнаты (Коробка 5x5) ---
        const ROOM_SIZE = 5;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 });
        
        // Функция для создания неровной стены (процедурный шум)
        function createWallGeometry(width, height) {
            const geom = new THREE.PlaneGeometry(width, height, 10, 10);
            const pos = geom.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                // Сдвигаем вершины по Z немного хаотично
                pos.setZ(i, (Math.random() - 0.5) * 0.1);
            }
            geom.computeVertexNormals();
            return geom;
        }

        // Пол
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE, ROOM_SIZE), new THREE.MeshStandardMaterial({color: 0x554433}));
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Стены (4 штуки)
        const wallNorth = new THREE.Mesh(createWallGeometry(ROOM_SIZE, 3), wallMat);
        wallNorth.position.set(0, 1.5, -ROOM_SIZE/2);
        
        const wallSouth = new THREE.Mesh(createWallGeometry(ROOM_SIZE, 3), wallMat);
        wallSouth.position.set(0, 1.5, ROOM_SIZE/2);
        wallSouth.rotation.y = Math.PI;

        const wallEast = new THREE.Mesh(createWallGeometry(ROOM_SIZE, 3), wallMat);
        wallEast.position.set(ROOM_SIZE/2, 1.5, 0);
        wallEast.rotation.y = -Math.PI/2;

        const wallWest = new THREE.Mesh(createWallGeometry(ROOM_SIZE, 3), wallMat);
        wallWest.position.set(-ROOM_SIZE/2, 1.5, 0);
        wallWest.rotation.y = Math.PI/2;

        scene.add(wallNorth, wallSouth, wallEast, wallWest);

        // --- Дверь (Заперта) ---
        const doorGeo = new THREE.BoxGeometry(0.9, 2, 0.1);
        const doorMat = new THREE.MeshStandardMaterial({color: 0x4a3121});
        const door = new THREE.Mesh(doorGeo, doorMat);
        // Размещаем на одной из стен (например, Северной)
        door.position.set(1.5, 1, -ROOM_SIZE/2 + 0.06); 
        scene.add(door);
        // Запомним позицию двери для столкновений
        const doorPos = door.position.clone();

        // --- Мебель ---
        
        // 1. Кровать (Небольшая, 1.9м x 0.9м)
        const bedGroup = new THREE.Group();
        const base = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 1.9), new THREE.MeshStandardMaterial({color: 0x333333}));
        const mattress = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.2, 1.85), new THREE.MeshStandardMaterial({color: 0xffffff}));
        mattress.position.y = 0.3;
        const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.3), new THREE.MeshStandardMaterial({color: 0xdddddd}));
        pillow.position.set(0, 0.45, -0.7);
        bedGroup.add(base, mattress, pillow);
        bedGroup.position.set(-ROOM_SIZE/2 + 0.6, 0, 1); // В углу
        bedGroup.rotation.y = Math.PI/8;
        bedGroup.traverse(c => c.castShadow = true);
        scene.add(bedGroup);

        // 2. Стол
        const table = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.75, 0.6), new THREE.MeshStandardMaterial({color: 0x654321}));
        table.position.set(1.5, 0.375, 1.5);
        table.castShadow = true;
        table.receiveShadow = true;
        scene.add(table);

        // 3. Ноутбук (Не "нищий" - тонкий, серебристый)
        const laptop = new THREE.Group();
        const bottom = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 0.25), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
        const screen = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.23, 0.01), new THREE.MeshStandardMaterial({color: 0x000000}));
        screen.position.set(0, 0.12, -0.12);
        screen.rotation.x = -Math.PI/4;
        laptop.add(bottom, screen);
        laptop.position.set(1.5, 0.76, 1.5);
        scene.add(laptop);

        // --- Управление (Мобильный вариант) ---
        
        // Переменные для поворота (Look)
        let lookX = 0; 
        let lookY = 0;
        const LOOK_SPEED = 0.005;
        let isLooking = false;
        let lastTouchX = 0;

        const lookControls = document.getElementById('look-controls');
        
        lookControls.addEventListener('touchstart', (e) => {
            isLooking = true;
            lastTouchX = e.touches[0].clientX;
        });
        
        window.addEventListener('touchend', () => {
            isLooking = false;
        });

        window.addEventListener('touchmove', (e) => {
            if(!isLooking) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - lastTouchX;
            
            lookX -= deltaX * LOOK_SPEED;
            
            // Ограничение поворота головы вверх/вниз (чтобы не выворачивало)
            lookY = Math.max(-Math.PI/3, Math.min(Math.PI/3, lookY));
            
            camera.rotation.order = 'YXZ'; // Важно для правильного вращения
            camera.rotation.y = lookX;
            //camera.rotation.x = lookY; // Вертикальный взгляд отключил для простоты, но можно включить
            
            lastTouchX = touch.clientX;
        });

        // Переменные для ходьбы (Move)
        const moveVector = new THREE.Vector3(0, 0, 0); // Направление движения
        let moveKnobX = 0;
        let moveKnobY = 0;
        const maxDist = 40; // Радиус джойстика

        const stickBg = document.getElementById('stick-bg');
        const stickKnob = document.getElementById('stick-knob');

        stickBg.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Отключаем скролл страницы
            const touch = e.touches[0];
            const rect = stickBg.getBoundingClientRect();
            
            // Координаты касания относительно центра джойстика
            let touchX = touch.clientX - (rect.left + rect.width/2);
            let touchY = touch.clientY - (rect.top + rect.height/2);
            
            // Ограничиваем радиус джойстика
            const dist = Math.sqrt(touchX*touchX + touchY*touchY);
            if(dist > maxDist) {
                touchX *= maxDist/dist;
                touchY *= maxDist/dist;
            }
            
            // Визуальное положение кнопки
            moveKnobX = touchX;
            moveKnobY = touchY;
            stickKnob.style.transform = `translate(${moveKnobX}px, ${moveKnobY}px)`;
            
            // Вектор движения (нормализованный)
            moveVector.x = touchX / maxDist;
            moveVector.z = touchY / maxDist; // В Three.js Y вверх, Z вперед/назад
        });

        stickBg.addEventListener('touchend', () => {
            // Сброс джойстика
            moveKnobX = 0;
            moveKnobY = 0;
            stickKnob.style.transform = `translate(0px, 0px)`;
            moveVector.set(0,0,0);
        });


        // --- Физика (Столкновения) ---
        function checkCollisions(position) {
            const halfRoom = ROOM_SIZE / 2;
            const margin = 0.3; // Отступ от стен

            // 1. Ударяемся о стены (Коробка)
            position.x = Math.max(-halfRoom + margin, Math.min(halfRoom - margin, position.x));
            position.z = Math.max(-halfRoom + margin, Math.min(halfRoom - margin, position.z));

            // 2. Ударяемся о стол
            const distToTable = position.distanceTo(new THREE.Vector3(1.5, position.y, 1.5));
            if(distToTable < 0.8) {
                 // Простой отскок
                 const dir = new THREE.Vector3().subVectors(position, new THREE.Vector3(1.5, position.y, 1.5)).normalize();
                 position.add(dir.multiplyScalar(0.05));
            }
            
            // 3. Ударяемся о дверь (невидимая стена рядом с ней)
            const distToDoor = position.distanceTo(new THREE.Vector3(doorPos.x, position.y, doorPos.z));
            if(distToDoor < 0.5) {
                position.z += 0.1; // Отталкиваем назад
            }
        }


        // --- Основной цикл анимации ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            if(moveVector.length() > 0) {
                const speed = 2; // Скорость ходьбы
                
                // Создаем матрицу поворота камеры, чтобы идти туда, куда смотришь
                const yaw = camera.rotation.y;
                const forward = new THREE.SinCosTable(yaw); // Вспомогательный объект, но проще так:
                
                // Вектор движения в локальных координатах камеры
                const movement = new THREE.Vector3(moveVector.x, 0, moveVector.z);
                
                // Поворачиваем вектор движения на угол поворота камеры
                movement.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                
                // Применяем скорость и время
                const finalVelocity = movement.multiplyScalar(speed * delta);
                
                // Новая позиция
                const nextPos = camera.position.clone().add(finalVelocity);
                
                // Проверка столкновений перед движением
                checkCollisions(nextPos);
                
                // Применяем позицию
                camera.position.copy(nextPos);
            }

            renderer.render(scene, camera);
        }

        animate();

        // --- Обработка изменения размера окна ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
    </html>
