<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Gera App</title>

        body {

    <p>Добро пожаловать в Mini App!</p>
    <button class="btn" onclick="TgClose()">Закрыть приложение</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function TgClose() {
            tg.close();
        }
    </script>
