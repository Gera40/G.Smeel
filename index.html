<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Моя Комната 5x5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #stick-bg { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; 
                    background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #stick-knob { width: 60px; height: 60px; background: white; border-radius: 50%; 
                      position: absolute; left: 30px; top: 30px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="stick-bg"><div id="stick-knob"></div></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- КОМНАТА ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), new THREE.MeshStandardMaterial({color: 0x332211}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        
        const createWall = (w, h, x, z, rot) => {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            m.position.set(x, h/2, z); m.rotation.y = rot; scene.add(m);
        };
        createWall(5, 3, 0, -2.5, 0); createWall(5, 3, 0, 2.5, Math.PI);
        createWall(5, 3, -2.5, 0, Math.PI/2); createWall(5, 3, 2.5, 0, -Math.PI/2);

        // --- МЕБЕЛЬ ---
        const bed = new THREE.Group();
        bed.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 2), new THREE.MeshStandardMaterial({color: 0x4a3c31})));
        const mat = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.2, 1.9), new THREE.MeshStandardMaterial({color: 0xffffff}));
        mat.position.y = 0.25; bed.add(mat);
        const pil = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.15, 0.4), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
        pil.position.set(0, 0.4, -0.6); bed.add(pil);
        bed.position.set(-1.5, 0, -1); scene.add(bed);

        const table = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.6), new THREE.MeshStandardMaterial({color: 0x8b4513}));
        table.position.set(1.5, 0.35, 1.5); scene.add(table);
        const lap = new THREE.Group();
        lap.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.02, 0.4), new THREE.MeshStandardMaterial({color: 0x222222})));
        const scr = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.25, 0.02), new THREE.MeshStandardMaterial({color: 0x000000}));
        scr.position.set(0, 0.14, -0.2); scr.rotation.x = -Math.PI/5; lap.add(scr);
        lap.position.set(1.5, 0.71, 1.5); scene.add(lap);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        camera.position.set(0, 1.6, 0);

        // --- УПРАВЛЕНИЕ ---
        let yaw = 0, pitch = 0, move = {x: 0, z: 0};

        // Поворот камеры (всей правой стороной)
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length === 1 && e.touches[0].clientX > window.innerWidth / 2) {
                yaw -= e.changedTouches[0].movementX * 0.005;
                pitch -= e.changedTouches[0].movementY * 0.005;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        }, {passive: false});

        // Джойстик
        const stick = document.getElementById('stick-bg');
        stick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = stick.getBoundingClientRect();
            move.x = (e.touches[0].clientX - (rect.left + 60)) / 50;
            move.z = (e.touches[0].clientY - (rect.top + 60)) / 50;
        }, {passive: false});
        stick.addEventListener('touchend', () => { move.x = 0; move.z = 0; });

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const dir = new THREE.Vector3(move.x, 0, move.z).applyEuler(new THREE.Euler(0, yaw, 0));
            const next = camera.position.clone().add(dir.multiplyScalar(0.06));
            if(Math.abs(next.x) < 2.3 && Math.abs(next.z) < 2.3) camera.position.copy(next);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
    </html>
