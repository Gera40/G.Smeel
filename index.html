<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        button { width: 80px; height: 80px; font-size: 20px; border-radius: 50%; border: none; background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div id="controls">
        <button onclick="move(-1)">Назад</button>
        <button onclick="move(1)">Вперед</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(2, 5, 2);
        scene.add(light);

        // Обои (стены с неровностями)
        const geometry = new THREE.PlaneGeometry(10, 5, 32, 32);
        // Добавляем шум в вершины для "кривизны"
        const pos = geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            pos.setZ(i, Math.random() * 0.2); 
        }
        const material = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, wireframe: false });
        const wall = new THREE.Mesh(geometry, material);
        scene.add(wall);

        // Кровать (простой куб)
        const bed = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 3), new THREE.MeshStandardMaterial({color: 0x8b4513}));
        bed.position.set(0, -1, 0);
        scene.add(bed);

        // Стол
        const table = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 1), new THREE.MeshStandardMaterial({color: 0x555555}));
        table.position.set(3, -0.6, 0);
        scene.add(table);

        camera.position.z = 5;

        window.move = (dir) => { camera.position.z -= dir * 0.5; };

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
    </html>
