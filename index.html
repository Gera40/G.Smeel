<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Комната</title>
    <style>body { margin: 0; background: #fffde7; } canvas { display: block; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffcc); // Желтоватый фон (стены)

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Пол
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshBasicMaterial({color: 0xffffff})
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Кровать
        const bed = new THREE.Mesh(
            new THREE.BoxGeometry(4, 1, 6),
            new THREE.MeshBasicMaterial({color: 0x81c784}) // Зеленоватая кровать
        );
        bed.position.set(-5, 0.5, 0);
        scene.add(bed);

        // Стол
        const desk = new THREE.Mesh(
            new THREE.BoxGeometry(3, 1, 2),
            new THREE.MeshBasicMaterial({color: 0x795548}) // Коричневый стол
        );
        desk.position.set(5, 0.5, 0);
        scene.add(desk);

        camera.position.set(0, 2, 10);

        // Управление клавиатурой
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w') camera.position.z -= 0.5;
            if(e.key === 's') camera.position.z += 0.5;
            if(e.key === 'a') camera.position.x -= 0.5;
            if(e.key === 'd') camera.position.x += 0.5;
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
