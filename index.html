<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>App Secure</title>
    <style>
        body { font-family: sans-serif; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .box { background: #333; padding: 30px; border-radius: 20px; text-align: center; width: 300px; }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; margin: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2>Вход</h2>
    <input type="password" id="pin" placeholder="PIN код">
    <button onclick="login()">Войти</button>
</div>

<div id="app-box" class="box hidden">
    <div id="view">
        <h2>Меню</h2>
        <button onclick="render('games')">Игры</button>
        <button onclick="render('emoji')">Смайлы</button>
    </div>
</div>

<script>
    const VALID_PIN = "0604";

    function login() {
        if (document.getElementById('pin').value === VALID_PIN) {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('app-box').classList.remove('hidden');
        } else { alert("ОШИБКА"); }
    }

    function render(tab) {
        const view = document.getElementById('view');
        if (tab === 'games') {
            view.innerHTML = `<h3>Кликер</h3><button onclick="alert('Клик!')">Нажми меня</button><br><button onclick="location.reload()">Назад</button>`;
        } else if (tab === 'emoji') {
            view.innerHTML = `<h3>Перевод</h3><input id="word" placeholder="Слово"><button onclick="trans()">ОК</button><br><p id="res"></p><button onclick="location.reload()">Назад</button>`;
        }
    }

    function trans() {
        const w = document.getElementById('word').value;
        const dict = {"привет": "👋", "пока": "👋"};
        document.getElementById('res').innerText = dict[w] || "Нет в словаре";
    }
</script>
</body>
</html>
