<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Комната: Полная Сборка</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; 
                    background: rgba(255,255,255,0.15); border-radius: 50%; z-index: 100; }
        #thumb { width: 65px; height: 65px; background: rgba(255,255,255,0.8); border-radius: 50%; 
                 position: absolute; left: 32.5px; top: 32.5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="joystick"><div id="thumb"></div></div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // 1. Сцена и Рендерер
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Освещение
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(0, 3, 0);
        scene.add(light);

        // 3. Комната (Пол + 4 стены)
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), new THREE.MeshStandardMaterial({color: 0x443322}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        function createWall(x, z, rot) {
            const wall = new THREE.Mesh(new THREE.PlaneGeometry(5, 3), new THREE.MeshStandardMaterial({color: 0x999999}));
            wall.position.set(x, 1.5, z); wall.rotation.y = rot; scene.add(wall);
        }
        createWall(0, -2.5, 0); createWall(0, 2.5, Math.PI);
        createWall(-2.5, 0, Math.PI/2); createWall(2.5, 0, -Math.PI/2);

        // 4. Мебель (Кровать и Стол)
        const bed = new THREE.Group();
        bed.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 2), new THREE.MeshStandardMaterial({color: 0x5a4339})));
        const mat = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.2, 1.8), new THREE.MeshStandardMaterial({color: 0xffffff}));
        mat.position.y = 0.25; bed.add(mat);
        const pil = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.3), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
        pil.position.set(0, 0.4, -0.6); bed.add(pil);
        bed.position.set(-1.5, 0, -1); scene.add(bed);

        const table = new THREE.Group();
        table.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.6), new THREE.MeshStandardMaterial({color: 0x765320})));
        const lap = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.25, 0.3), new THREE.MeshStandardMaterial({color: 0x000000}));
        lap.position.set(0, 0.45, 0); lap.rotation.x = -Math.PI/5; table.add(lap);
        table.position.set(1.5, 0.35, 1.5); scene.add(table);

        // 5. Логика управления
        let yaw = 0, pitch = 0, moveX = 0, moveZ = 0;
        camera.position.set(0, 1.6, 0);

        // Обзор (правая часть экрана)
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length === 1 && e.touches[0].clientX > window.innerWidth / 3) {
                yaw -= e.changedTouches[0].movementX * 0.005;
                pitch -= e.changedTouches[0].movementY * 0.005;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        });

        // Джойстик (левая часть)
        const js = document.getElementById('joystick');
        js.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = js.getBoundingClientRect();
            moveX = (e.touches[0].clientX - (rect.left + 65)) / 50;
            moveZ = (e.touches[0].clientY - (rect.top + 65)) / 50;
        }, {passive: false});
        js.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        // 6. Цикл отрисовки
        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const dir = new THREE.Vector3(moveX, 0, moveZ).applyEuler(new THREE.Euler(0, yaw, 0));
            const next = camera.position.clone().add(dir.multiplyScalar(0.08));
            
            // Физика: проверка границ комнаты
            if(next.x > -2.2 && next.x < 2.2 && next.z > -2.2 && next.z < 2.2) {
                camera.position.copy(next);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
