<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MONO SYSTEM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 300px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        button { padding: 20px; border-radius: 50%; border: none; background: #222; color: #fff; cursor: pointer; font-size: 20px; }
        #dots { letter-spacing: 20px; font-size: 35px; margin: 20px 0; }
        #cat-screen { display: none; }
    </style>
</head>
<body>

<div id="auth" class="container">
    <h3>ВВЕДИТЕ PIN</h3>
    <div id="dots">----</div>
    <div class="grid">
        <script>for(let i=1; i<=9; i++) document.write(`<button onclick="input('${i}')">${i}</button>`);</script>
        <button onclick="input('0')" style="grid-column: 2;">0</button>
    </div>
</div>

<div id="cat-screen" class="container">
    <h2>МОНО</h2>
    <div style="font-size: 80px;">🐈</div>
    <button onclick="location.reload()" style="border-radius: 10px; width: 100%;">Выход</button>
</div>

<script>
    let code = "", pin = "0604";
    
    function input(n) {
        if (code.length < 4) {
            code += n;
            document.getElementById('dots').innerText = "*".repeat(code.length);
        }
        if (code.length === 4) {
            if (code === pin) {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('cat-screen').style.display = 'block';
            } else {
                alert("НЕВЕРНЫЙ КОД");
                code = "";
                document.getElementById('dots').innerText = "----";
            }
        }
    }
</script>
</body>
</html>
